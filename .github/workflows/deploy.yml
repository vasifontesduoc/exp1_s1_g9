name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Clonar repositorio
              uses: actions/checkout@v4

            - name: Configurar Java
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Dar permisos a Maven Wrapper
              run: chmod +x mvnw

            - name: Compilar proyecto
              run: ./mvnw clean package -DskipTests

            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Construir imagen Docker
              run: docker build -t vasifontes/exp1_s1_g9 .

            - name: Subir imagen a Docker Hub
              run: docker push vasifontes/exp1_s1_g9

            - name: Deploy en EC2
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USERNAME }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      docker stop exp1_s1_g9 || true
                      docker rm exp1_s1_g9 || true
                      docker pull vasifontes/exp1_s1_g9
                      docker run -d -p 8080:8080 --name exp1_s1_g9 vasifontes/exp1_s1_g9
